<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/graph.css">
    <link rel="stylesheet" href="css/era.css">
    <link rel="stylesheet" href="css/timeline.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="shortcut icon" href="logo/Q-Logo.png" type="image/x-icon">
    <title>Qadar Chain</title>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="js/particles.js"></script>
    <script type="module" src="js/state.js"></script>
    <script type="module" src="js/what-if.js"></script>
    <script type="module" src="js/loader.js"></script>
    <script type="module" src="js/node-graph.js"></script>
    <script type="module" src="js/sound.js"></script>
    <script type="module" src="js/panel.js"></script>
    <script type="module" src="js/timeline.js"></script>
    <script type="module" src="js/era-filter.js"></script>
    <script type="module" src="js/search.js"></script>

    <header class="title">
            <span class="title-main">QADAR</span>
            <span class="title-accent">CHAIN</span>
    </header>

    <div id="node-search-wrapper">
        <div id="node-search-container">
            <input id="node-search-input" type="text" placeholder="Search events…" autocomplete="off" spellcheck="false" />
            <span id="node-search-icon">⌕</span>
            <div id="node-search-results"></div>
        </div>
    </div>

    <svg id="node-graph">
        <defs></defs>
        <g id="main-g"> </g>
    </svg>
    <button id="sidebar-toggle" class="sidebar-toggle">☰</button>
    <div id="sidebar" class="sidebar open">
        <div class="sidebar-header"></div>
        <div class="sidebar-content"></div>
    </div>
    <div id="era-filter"></div>
    <div id="timeline"></div>
    <div id="particles"></div>
    <script src="js/sidebar.js"></script>
</body>
</html>
